name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
    - name: Run tests
      run: |
        python tests/test_main.py
    - name: Random delay
      run: |
        sleep $(( RANDOM % 30 ))
    - name: Random failure
      run: |
        if [ $(( RANDOM % 5 )) -eq 0 ]; then
          echo "Random failure!"
          exit 1
        fi